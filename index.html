<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموقع مغلق حالياً</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top right,#1e293b,#0f172a 60%);
    overflow:hidden;
}

.card{
    width:90%;
    max-width:550px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:30px;
    padding:50px 35px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
    width:120px;
    height:120px;
    margin:0 auto 25px;
    border-radius:50%;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* إذا لم يكن لديك شعار بعد */
.logo span{
    font-size:40px;
    font-weight:bold;
    color:#0f172a;
}

.status{
    display:inline-block;
    background:rgba(239,68,68,.15);
    color:#fca5a5;
    padding:8px 18px;
    border-radius:50px;
    font-size:14px;
    margin-bottom:20px;
}

h1{
    font-size:34px;
    margin-bottom:15px;
    font-weight:700;
}

p{
    color:#cbd5e1;
    line-height:2;
    font-size:18px;
}

.divider{
    width:80px;
    height:4px;
    background:#22c55e;
    margin:25px auto;
    border-radius:20px;
}

.footer{
    margin-top:35px;
    color:#94a3b8;
    font-size:15px;
}

.glow{
    position:absolute;
    width:300px;
    height:300px;
    background:#22c55e20;
    border-radius:50%;
    filter:blur(100px);
    top:-100px;
    right:-100px;
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="card">

    <div class="logo">
        <!-- استبدل logo.png بشعار موقعك -->
        <img src="logo.png" alt="Logo">

        <!-- أو احذف img واستخدم النص -->
        <!-- <span>G</span> -->
    </div>

    <div class="status">
        ● غير متاح حالياً
    </div>

    <h1>الموقع مغلق حالياً</h1>

    <div class="divider"></div>

    <p>
        لا يمكن الوصول إلى الموقع في الوقت الحالي.
        <br>
        يرجى المحاولة مرة أخرى في وقت لاحق.
    </p>

    <div class="footer">
        © 2026 جميع الحقوق محفوظة
    </div>

</div>

</body>
</html>
